<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocolo AGA | Final</title>
    <style>
        :root { --blue: #2c3e50; --green: #27ae60; --yellow: #f1c40f; --red: #e74c3c; --purple: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: #ecf0f1; padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        #printableArea { background: white; width: 100%; max-width: 480px; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--blue); box-sizing: border-box; }
        
        h2 { text-align: center; color: var(--blue); margin: 0 0 15px 0; font-size: 1.1em; text-transform: uppercase; }
        
        .status { 
            text-align: center; font-weight: bold; padding: 12px; margin-bottom: 15px; border-radius: 6px; 
            font-size: 14px; text-transform: uppercase; border: 2px solid rgba(0,0,0,0.05);
            -webkit-print-color-adjust: exact; print-color-adjust: exact; 
        }
        .status-emision { background-color: var(--yellow) !important; color: #000 !important; }
        .status-registrado { background-color: var(--red) !important; color: #fff !important; }
        .status-devuelto { background-color: var(--green) !important; color: #fff !important; }

        .field { margin-bottom: 10px; }
        label { display: block; font-size: 10px; font-weight: bold; color: var(--blue); margin-bottom: 3px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; box-sizing: border-box; font-size: 14px; color: #000; background: #fff; }
        input[readonly] { background: #f8f9fa; border: 1px solid #eee; font-weight: bold; color: var(--blue); }

        #sig-wrap { border: 2px dashed var(--blue); background: #fff; border-radius: 8px; height: 160px; position: relative; }
        canvas { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
        
        .no-print { width: 100%; max-width: 480px; margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; color: white; transition: 0.2s; }
        .btn-search { background: var(--blue); border-left: 2px solid white; }
        .btn-save { background: var(--green); }
        .btn-return { background: var(--purple); display: none; }
        .btn-new { background: #7f8c8d; }
        .btn-clear { background: #95a5a6; padding: 5px 10px; width: auto; font-size: 10px; float: right; margin-top: 5px; border: none; border-radius: 4px; color: white; }

        @media print {
            .no-print, .btn-clear { display: none !important; }
            body { padding: 0; background: white; }
            #printableArea { box-shadow: none; border: 1px solid #000; max-width: 100%; }
        }
    </style>
</head>
<body>

<div id="printableArea">
    <h2 id="titulo">Protocolo de Custodia AGA</h2>
    <div id="statusTxt" class="status status-emision">Estado: En Emisión</div>

    <div class="field">
        <label>ID Transacción</label>
        <input type="text" id="idVale" readonly>
    </div>

    <div class="field">
        <label>Fecha</label>
        <input type="text" id="fecha" readonly>
    </div>

    <div class="field">
        <label>Descripción Equipo (BMI)</label>
        <input type="text" id="producto" placeholder="Radio, Notebook, etc...">
    </div>

    <div class="field">
        <label>Responsable</label>
        <input type="text" id="responsable" placeholder="Grado y Nombre">
    </div>

    <div class="field">
        <label>Observaciones</label>
        <textarea id="obs" rows="2"></textarea>
    </div>

    <div class="field">
        <label>Firma</label>
        <div id="sig-wrap">
            <canvas id="canvas"></canvas>
        </div>
        <button class="btn-clear no-print" onclick="limpiar()">Borrar Firma</button>
    </div>
</div>

<div class="no-print">
    <div style="display:flex; gap:0;">
        <input type="text" id="busquedaId" style="flex:1; border-radius: 8px 0 0 8px;" placeholder="Ingresar ID...">
        <button class="btn btn-search" style="border-radius: 0 8px 8px 0; padding:10px 20px;" onclick="buscar()">BUSCAR</button>
    </div>
    <button id="btnFinalizar" class="btn btn-save" onclick="guardar()">Finalizar y Generar PDF</button>
    <button id="btnDevolver" class="btn btn-return" onclick="devolver()">Registrar Devolución</button>
    <button class="btn btn-new" onclick="nuevo()">Nuevo Procedimiento</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dibujando = false;

    window.onload = () => { nuevo(); ajustarCanvas(); };

    function ajustarCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
    }

    function nuevo() {
        document.getElementById('idVale').value = "AGA-" + Math.floor(Date.now() / 10000);
        document.getElementById('fecha').value = new Date().toLocaleString();
        document.getElementById('producto').value = "";
        document.getElementById('responsable').value = "";
        document.getElementById('obs').value = "";
        document.getElementById('busquedaId').value = "";
        
        const st = document.getElementById('statusTxt');
        st.className = "status status-emision";
        st.innerText = "Estado: En Emisión";
        
        document.getElementById('btnFinalizar').style.display = "block";
        document.getElementById('btnDevolver').style.display = "none";
        limpiar();
    }

    // Sistema de Dibujo Optimizado
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function empezar(e) { dibujando = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); if(e.touches) e.preventDefault(); }
    function mover(e) { if(!dibujando) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.touches) e.preventDefault(); }

    canvas.addEventListener('mousedown', empezar);
    canvas.addEventListener('mousemove', mover);
    window.addEventListener('mouseup', () => dibujando = false);
    canvas.addEventListener('touchstart', empezar, {passive: false});
    canvas.addEventListener('touchmove', mover, {passive: false});
    canvas.addEventListener('touchend', () => dibujando = false);

    function limpiar() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // BUSCADOR REPARADO (EVITA BLOQUEOS)
    function buscar() {
        const idBuscado = document.getElementById('busquedaId').value.trim();
        if(!idBuscado) return;

        // Recuperar base de datos
        const db = JSON.parse(localStorage.getItem('AGA_DB')) || [];
        const reg = db.find(r => r.id === idBuscado);

        if(reg) {
            // Cargar datos en los campos
            document.getElementById('idVale').value = reg.id;
            document.getElementById('fecha').value = reg.fecha;
            document.getElementById('producto').value = reg.producto;
            document.getElementById('responsable').value = reg.responsable;
            document.getElementById('obs').value = reg.obs;
            
            // Re-dibujar firma
            const img = new Image();
            img.onload = () => { limpiar(); ctx.drawImage(img, 0, 0); };
            img.src = reg.firma;
            
            // Actualizar Estado Visual
            const st = document.getElementById('statusTxt');
            if(reg.estado === "DEVUELTO") {
                st.className = "status status-devuelto";
                st.innerText = "Estado: Devolución Completada";
                document.getElementById('btnDevolver').style.display = "none";
            } else {
                st.className = "status status-registrado";
                st.innerText = "Estado: En Custodia (Registrado)";
                document.getElementById('btnDevolver').style.display = "block";
            }
            document.getElementById('btnFinalizar').style.display = "none";
        } else {
            alert("ID " + idBuscado + " no encontrado.");
        }
    }

    function guardar() {
        if(!document.getElementById('producto').value || !document.getElementById('responsable').value) {
            alert("⚠️ Complete Producto y Responsable");
            return;
        }

        const data = {
            id: document.getElementById('idVale').value,
            fecha: document.getElementById('fecha').value,
            producto: document.getElementById('producto').value,
            responsable: document.getElementById('responsable').value,
            obs: document.getElementById('obs').value,
            firma: canvas.toDataURL(),
            estado: "REGISTRADO"
        };

        let db = JSON.parse(localStorage.getItem('AGA_DB')) || [];
        db.push(data);
        localStorage.setItem('AGA_DB', JSON.stringify(db));
        
        // Efecto visual de guardado antes de imprimir
        document.getElementById('statusTxt').className = "status status-registrado";
        document.getElementById('statusTxt').innerText = "Estado: En Custodia (Registrado)";
        
        setTimeout(() => { window.print(); }, 400);
    }

    function devolver() {
        const idActual = document.getElementById('idVale').value;
        let db = JSON.parse(localStorage.getItem('AGA_DB')) || [];
        const index = db.findIndex(r => r.id === idActual);

        if(index !== -1) {
            db[index].estado = "DEVUELTO";
            db[index].fecha = "Cerrado: " + new Date().toLocaleString();
            localStorage.setItem('AGA_DB', JSON.stringify(db));
            
            // Refrescar vista
            document.getElementById('fecha').value = db[index].fecha;
            const st = document.getElementById('statusTxt');
            st.className = "status status-devuelto";
            st.innerText = "Estado: Devolución Completada";
            
            document.getElementById('btnDevolver').style.display = "none";
            
            setTimeout(() => { window.print(); }, 400);
        }
    }
</script>
</body>
</html>
