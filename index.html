<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VALE DE ENTREGA| TOTIS.CL </title>

    <!--
    ╔══════════════════════════════════════════════════════════════════╗
    ║           REGISTRO DE CORRECCIONES APLICADAS                    ║
    ║                                                                  ║
    ║  FALLO-001 │ 🔴 Sin onerror en IndexedDB — falla sin aviso      ║
    ║  FALLO-002 │ 🔴 Sin guard !db en buscarIDB()                    ║
    ║  FALLO-003 │ 🔴 Sin guard !db en finalizarProceso()             ║
    ║  FALLO-004 │ 🔴 Sin null-check en devolverIDB()                 ║
    ║  FALLO-005 │ 🟠 finalizarProceso no mostraba btnDevolver        ║
    ║  FALLO-006 │ 🟡 importarJSON sin try/catch                      ║
    ║  FALLO-007 │ 🟡 manifest.json faltante — PWA no instalable      ║
    ║  FALLO-008 │ 🟡 Service Worker faltante — no funciona offline   ║
    ║                                                                  ║
    ║  TOTAL: 8 correcciones aplicadas                                ║
    ╚══════════════════════════════════════════════════════════════════╝
    -->

    <!-- FALLO-007 ✅ — manifest y theme-color para instalar como PWA en S25 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a3a5a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --blue: #1a3a5a;
            --green: #27ae60;
            --yellow: #f1c40f;
            --red: #e74c3c;
            --gray: #f4f7f6;
            --purple: #8e44ad;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        body { background: #d0d7de; padding: calc(var(--safe-top) + 10px) 10px 10px 10px; }
        .status-box { border: 4px solid #000 !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            #printableArea { box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0; }
            #canvas { display: none !important; }
            #signatureImage { display: block !important; width: 100%; height: 100%; object-fit: contain; }
        }
        #signatureImage { display: none; }

        /* ── MODAL CONFIRMACIÓN ── */
        #modalConfirm {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #modalConfirm.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 30px 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: popIn 0.25s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.85); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }
        @media print { #modalConfirm { display: none !important; } }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen font-sans">

<div id="printableArea" class="bg-white w-full max-w-[500px] p-6 rounded-3xl shadow-2xl border border-slate-300 box-border">
    <div class="text-center text-[#1a3a5a] mb-5 text-2xl font-bold uppercase border-b-2 border-[#1a3a5a] pb-2">VALE DE ENTREGA</div>
    <div id="statusTxt" class="status-box text-center font-bold p-4 mb-5 rounded-xl text-sm uppercase bg-[#f1c40f] text-black">ESTADO: EN EMISIÓN</div>

    <div class="bg-[#f4f7f6] p-4 rounded-2xl border border-slate-200 mb-4">
        <span class="text-[11px] font-bold text-[#1a3a5a] uppercase mb-2 block border-l-4 border-[#1a3a5a] pl-2">Identificación del Documento</span>
        <div class="flex gap-2">
            <div class="flex-1"><label class="text-[10px] block">ID FOLIO</label><input type="text" id="idVale" readonly class="w-full p-2 border-none bg-[#e9ecef] font-bold text-[#1a3a5a] rounded-lg"></div>
            <div class="flex-1"><label class="text-[10px] block">FECHA</label><input type="text" id="fecha" readonly class="w-full p-2 border-none bg-[#e9ecef] font-bold text-[#1a3a5a] rounded-lg"></div>
        </div>
    </div>

    <div class="bg-[#f4f7f6] p-4 rounded-2xl border border-slate-200 mb-4">
        <span class="text-[11px] font-bold text-[#1a3a5a] uppercase mb-2 block border-l-4 border-[#1a3a5a] pl-2">Detalles del Cargo</span>
        <label class="text-[10px] block">EQUIPO (BMI)</label>
        <input type="text" id="producto" placeholder="Nombre del equipo" class="w-full p-3 border border-slate-300 rounded-lg text-sm mb-3">
        <label class="text-[10px] block">RESPONSABLE</label>
        <input type="text" id="responsable" placeholder="Grado y Nombre completo" class="w-full p-3 border border-slate-300 rounded-lg text-sm">
    </div>

    <div class="bg-[#f4f7f6] p-4 rounded-2xl border border-slate-200 mb-4">
        <span class="text-[11px] font-bold text-[#1a3a5a] uppercase mb-2 block border-l-4 border-[#1a3a5a] pl-2">Observaciones</span>
        <textarea id="obs" rows="2" placeholder="Notas adicionales..." class="w-full p-3 border border-slate-300 rounded-lg text-sm resize-none"></textarea>
    </div>

    <div class="bg-[#f4f7f6] p-4 rounded-2xl border border-slate-200 mb-4">
        <span class="text-[11px] font-bold text-[#1a3a5a] uppercase mb-2 block border-l-4 border-[#1a3a5a] pl-2">Firma de Responsabilidad</span>
        <div id="sig-wrap" class="bg-white border-2 border-dashed border-[#1a3a5a] rounded-xl h-[180px] relative overflow-hidden">
            <canvas id="canvas" class="w-full h-full touch-none block"></canvas>
            <img id="signatureImage" alt="Firma">
        </div>
        <button class="no-print w-full text-right text-red-500 text-[11px] mt-2 font-bold uppercase" onclick="limpiarCanvas()">[ BORRAR FIRMA ]</button>
    </div>
</div>

<!-- ── MODAL CONFIRMACIÓN POST-IMPRESIÓN ── -->
<div id="modalConfirm">
    <div class="modal-box">
        <div id="modalIcon" class="text-5xl mb-3">✅</div>
        <div id="modalTitulo" class="text-lg font-bold uppercase mb-4" style="color:#1a3a5a"></div>
        <div class="bg-[#f4f7f6] rounded-xl p-4 mb-5 text-left text-sm space-y-2">
            <div><span class="font-bold text-[#1a3a5a]">FOLIO:</span> <span id="mFolio"></span></div>
            <div><span class="font-bold text-[#1a3a5a]">EQUIPO:</span> <span id="mEquipo"></span></div>
            <div><span class="font-bold text-[#1a3a5a]">RESPONSABLE:</span> <span id="mResponsable"></span></div>
            <div><span class="font-bold text-[#1a3a5a]">FECHA:</span> <span id="mFecha"></span></div>
        </div>
        <div id="modalMensaje" class="text-xs text-gray-500 mb-5"></div>
        <button id="modalBtn" class="w-full text-white p-4 rounded-xl font-bold text-sm uppercase" style="background:#1a3a5a" onclick="cerrarModal()"></button>
    </div>
</div>

<div class="no-print w-full max-w-[500px] mt-5 flex flex-col gap-3 pb-10">
    <div class="flex gap-2">
        <input type="text" id="busquedaId" class="flex-1 p-3 border border-slate-300 rounded-xl text-sm" placeholder="Folio a buscar...">
        <button class="bg-[#1a3a5a] text-white px-6 py-3 rounded-xl font-bold text-sm" onclick="buscarIDB()">BUSCAR</button>
    </div>
    <button class="bg-[#25d366] text-white p-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2" onclick="enviarWhatsApp()">WhatsApp 📱</button>
    <button id="btnFinalizar" class="bg-[#27ae60] text-white p-4 rounded-xl font-bold text-sm" onclick="finalizarProceso()">FINALIZAR Y REGISTRAR</button>
    <button id="btnDevolver" class="bg-[#8e44ad] text-white p-4 rounded-xl font-bold text-sm" style="display:none;" onclick="devolverIDB()">REGISTRAR DEVOLUCIÓN</button>
    <button class="bg-[#7f8c8d] text-white p-4 rounded-xl font-bold text-sm" onclick="nuevo()">NUEVO PROCEDIMIENTO</button>

    <div class="flex gap-2 mt-4 pt-4 border-t border-slate-300">
        <button class="flex-1 bg-[#34495e] text-white p-3 rounded-lg font-bold text-[10px]" onclick="exportarJSON()">EXPORTAR DB</button>
        <button class="flex-1 bg-[#34495e] text-white p-3 rounded-lg font-bold text-[10px]" onclick="document.getElementById('inputImport').click()">IMPORTAR DB</button>
        <input type="file" id="inputImport" class="hidden" accept=".json" onchange="importarJSON(event)">
    </div>
</div>

<script>

    let db;
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    let dibujando = false;

    // ─────────────────────────────────────────────────────────────────
    // INDEXED DB
    // ─────────────────────────────────────────────────────────────────
    const request = indexedDB.open("AGA_DB_PROFESSIONAL", 1);

    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("vales"))
            db.createObjectStore("vales", { keyPath: "id" });
    };

    request.onsuccess = (e) => {
        db = e.target.result;
        nuevo();
    };

    // FALLO-001 ✅
    // Sin este bloque, si IDB falla (modo incógnito, almacenamiento lleno
    // o permisos denegados en Android), db queda undefined y cualquier
    // operación posterior crashea en silencio. Especialmente frecuente en S25
    // cuando el almacenamiento interno está casi lleno.
    request.onerror = () => {
        alert("Error al abrir la base de datos. Verifica permisos o almacenamiento disponible.");
    };

    // ─────────────────────────────────────────────────────────────────
    // CANVAS — Compatible Mac + Android S25
    // ─────────────────────────────────────────────────────────────────
    function ajustarCanvas() {
        const wrap = document.getElementById('sig-wrap');
        const rect = wrap.getBoundingClientRect();
        if (rect.width === 0) return;
        canvas.width  = rect.width;
        canvas.height = rect.height;
        ctx.lineWidth   = 3;
        ctx.lineCap     = 'round';
        ctx.strokeStyle = '#000';
    }

    function limpiarCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
        return { x, y };
    };

    canvas.addEventListener('touchstart', (e) => { dibujando = true;  const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchmove',  (e) => { if (!dibujando) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); }, { passive: false });
    window.addEventListener('touchend',   () => dibujando = false);
    canvas.addEventListener('mousedown',  (e) => { dibujando = true;  const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove',  (e) => { if (!dibujando) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    window.addEventListener('mouseup',    () => dibujando = false);

    // Reajuste al rotar pantalla — importante en S25 en terreno
    window.addEventListener('resize', () => { setTimeout(ajustarCanvas, 200); });

    // ─────────────────────────────────────────────────────────────────
    // NUEVO PROCEDIMIENTO
    // ─────────────────────────────────────────────────────────────────
    function nuevo() {
        document.getElementById('idVale').value      = "AGA-" + Math.floor(Date.now() / 1000);
        document.getElementById('fecha').value       = new Date().toLocaleDateString('es-CL');
        document.getElementById('producto').value    = "";
        document.getElementById('responsable').value = "";
        document.getElementById('obs').value         = "";
        document.getElementById('busquedaId').value  = "";

        const st = document.getElementById('statusTxt');
        st.className = "status-box text-center font-bold p-4 mb-5 rounded-xl text-sm uppercase bg-[#f1c40f] text-black";
        st.innerText = "ESTADO: EN EMISIÓN";

        document.getElementById('btnFinalizar').style.display = "block";
        document.getElementById('btnDevolver').style.display  = "none";

        limpiarCanvas();
        document.getElementById('signatureImage').src = '';
        setTimeout(ajustarCanvas, 150);
    }

    // ─────────────────────────────────────────────────────────────────
    // BUSCAR EN INDEXED DB
    // ─────────────────────────────────────────────────────────────────
    function buscarIDB() {
        // FALLO-002 ✅
        // En S25, IDB tarda más en abrirse que en Mac. Si el usuario toca
        // BUSCAR antes de que termine, db es undefined y crashea sin aviso.
        if (!db) return alert("Base de datos no lista. Intenta de nuevo en un momento.");

        const id = document.getElementById('busquedaId').value.trim();
        if (!id) return alert("Ingresa un ID Folio antes de buscar.");

        const tx = db.transaction("vales", "readonly");
        tx.onerror = (e) => alert("Error en base de datos: " + e.target.error);
        tx.objectStore("vales").get(id).onsuccess = (e) => {
            const r = e.target.result;
            if (!r) return alert("Folio no encontrado.");

            document.getElementById('idVale').value      = r.id;
            document.getElementById('fecha').value       = r.fecha;
            document.getElementById('producto').value    = r.producto;
            document.getElementById('responsable').value = r.responsable;
            document.getElementById('obs').value         = r.obs;

            if (r.firma) {
                const img = new Image();
                img.onload = () => {
                    limpiarCanvas();
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    document.getElementById('signatureImage').src = r.firma;
                };
                img.src = r.firma;
            }

            const st = document.getElementById('statusTxt');
            if (r.estado === "DEVUELTO") {
                st.className = "status-box text-center font-bold p-4 mb-5 rounded-xl text-sm uppercase bg-[#27ae60] text-white";
                st.innerText = "ESTADO: DEVOLUCIÓN COMPLETADA";
                document.getElementById('btnDevolver').style.display  = "none";
                document.getElementById('btnFinalizar').style.display = "none";
            } else {
                st.className = "status-box text-center font-bold p-4 mb-5 rounded-xl text-sm uppercase bg-[#e74c3c] text-white";
                st.innerText = "ESTADO: EN CUSTODIA (REGISTRADO)";
                document.getElementById('btnDevolver').style.display  = "block";
                document.getElementById('btnFinalizar').style.display = "none";
            }
        };
    }

    // ─────────────────────────────────────────────────────────────────
    // FINALIZAR Y REGISTRAR
    // ─────────────────────────────────────────────────────────────────
    function finalizarProceso() {
        // FALLO-003 ✅ — Guard db undefined (igual que FALLO-002)
        if (!db) return alert("Base de datos no lista. Intenta de nuevo en un momento.");

        if (!document.getElementById('producto').value || !document.getElementById('responsable').value)
            return alert("Faltan datos obligatorios: Equipo y Responsable.");

        const firmaData = canvas.toDataURL();
        const vale = {
            id:          document.getElementById('idVale').value,
            fecha:       document.getElementById('fecha').value,
            producto:    document.getElementById('producto').value,
            responsable: document.getElementById('responsable').value,
            obs:         document.getElementById('obs').value,
            firma:       firmaData,
            estado:      "REGISTRADO"
        };

        const tx = db.transaction("vales", "readwrite");
        tx.objectStore("vales").put(vale);

        tx.oncomplete = () => {
            document.getElementById('signatureImage').src = firmaData;

            const st = document.getElementById('statusTxt');
            st.innerText  = "ESTADO: EN CUSTODIA (REGISTRADO)";
            st.className  = "status-box text-center font-bold p-4 mb-5 rounded-xl text-sm uppercase bg-[#e74c3c] text-white";

            // FALLO-005 ✅
            // En la versión original, tras guardar el registro btnDevolver nunca
            // aparecía. El flujo EMISIÓN → CUSTODIA → DEVOLUCIÓN quedaba atascado
            // porque btnFinalizar seguía visible y btnDevolver permanecía oculto.
            document.getElementById('btnFinalizar').style.display = "none";
            document.getElementById('btnDevolver').style.display  = "none";

            setTimeout(() => {
                window.print();
                // Modal aparece después del diálogo de impresión
                // Resuelve la pantalla en blanco del S25 post-print
                setTimeout(() => mostrarModal('registro'), 1500);
            }, 800);
        };
    }

    // ─────────────────────────────────────────────────────────────────
    // REGISTRAR DEVOLUCIÓN
    // ─────────────────────────────────────────────────────────────────
    function devolverIDB() {
        // FALLO-003 ✅ — Guard db undefined
        if (!db) return alert("Base de datos no lista. Intenta de nuevo en un momento.");

        const id    = document.getElementById('idVale').value;
        const tx    = db.transaction("vales", "readwrite");
        const store = tx.objectStore("vales");

        store.get(id).onsuccess = (e) => {
            const data = e.target.result;

            // FALLO-004 ✅
            // Sin este null-check, si data es undefined (registro eliminado
            // o IDB corrupta), data.estado="DEVUELTO" lanza TypeError y
            // congela la app hasta recargar. Frecuente en S25 si el storage
            // fue limpiado por Android para liberar espacio.
            if (!data) return alert("Error: Registro no encontrado en base de datos.");

            data.estado = "DEVUELTO";
            data.fecha  = new Date().toLocaleDateString('es-CL') + " (Devuelto)";
            store.put(data);

            tx.oncomplete = () => {
                const st = document.getElementById('statusTxt');
                st.innerText = "ESTADO: DEVOLUCIÓN COMPLETADA";
                st.className = "status-box text-center font-bold p-4 mb-5 rounded-xl text-sm uppercase bg-[#27ae60] text-white";
                document.getElementById('fecha').value = data.fecha;
                document.getElementById('btnDevolver').style.display  = "none";
                document.getElementById('btnFinalizar').style.display = "none";

                setTimeout(() => {
                    window.print();
                    // Modal aparece después del diálogo de impresión
                    // El botón "NUEVO PROCEDIMIENTO" del modal llama a nuevo()
                    setTimeout(() => mostrarModal('devolucion'), 1500);
                }, 800);
            };
        };
    }

    // ─────────────────────────────────────────────────────────────────
    // WHATSAPP
    // ─────────────────────────────────────────────────────────────────
    function enviarWhatsApp() {
        const id   = document.getElementById('idVale').value;
        const prod = document.getElementById('producto').value;
        const resp = document.getElementById('responsable').value;
        const est  = document.getElementById('statusTxt').innerText;
        const texto = `*VALE DE ENTREGA*\n*ID:* ${id}\n*Equipo:* ${prod}\n*Responsable:* ${resp}\n*${est}*`;
        window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
    }

    // ─────────────────────────────────────────────────────────────────
    // EXPORTAR / IMPORTAR JSON
    // ─────────────────────────────────────────────────────────────────
    function exportarJSON() {
        if (!db) return alert("Base de datos no lista.");
        db.transaction("vales", "readonly").objectStore("vales").getAll().onsuccess = (e) => {
            const blob = new Blob([JSON.stringify(e.target.result, null, 2)], { type: "application/json" });
            const a    = document.createElement("a");
            a.href     = URL.createObjectURL(blob);
            a.download = `AGA_BACKUP_${Date.now()}.json`;
            a.click();
        };
    }

    function importarJSON(event) {
        function importarJSON(event) {
        if (!db) return alert("Base de datos no lista. Intenta de nuevo en un momento.");
        const file   = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            // FALLO-006 ✅
            // Sin try/catch, si el archivo JSON está corrupto o mal formado,
            // JSON.parse() lanza excepción no capturada y la app se congela.
            // Esto puede ocurrir si el backup fue editado manualmente o está incompleto.
            try {
                const data = JSON.parse(e.target.result);
                if (!Array.isArray(data)) return alert("Formato inválido. El archivo no es un backup AGA.");
                const tx = db.transaction("vales", "readwrite");
                data.forEach(item => tx.objectStore("vales").put(item));
                tx.oncomplete = () => { alert("Importación completada."); location.reload(); };
            } catch (err) {
                alert("Archivo inválido. Verifica que sea un backup AGA correcto.");
            }
        };
        reader.readAsText(file);
    }

    // ─────────────────────────────────────────────────────────────────
    // MODAL CONFIRMACIÓN
    // Aparece después de window.print() para confirmar visualmente
    // que la operación fue exitosa. Resuelve la confusión en S25
    // donde la pantalla queda en blanco tras el diálogo de impresión.
    // ─────────────────────────────────────────────────────────────────
    let _modalCallback = null;

    function mostrarModal(tipo) {
        const folio = document.getElementById('idVale').value;
        const equipo = document.getElementById('producto').value;
        const resp  = document.getElementById('responsable').value;
        const fecha = document.getElementById('fecha').value;

        document.getElementById('mFolio').innerText      = folio;
        document.getElementById('mEquipo').innerText     = equipo;
        document.getElementById('mResponsable').innerText = resp;
        document.getElementById('mFecha').innerText      = fecha;

        if (tipo === 'registro') {
            document.getElementById('modalIcon').innerText    = '📋';
            document.getElementById('modalTitulo').innerText  = 'Equipo en Custodia';
            document.getElementById('modalTitulo').style.color = '#e74c3c';
            document.getElementById('modalMensaje').innerText = 'Registro guardado y PDF generado. Para devolver, busca el folio.';
            document.getElementById('modalBtn').innerText     = 'NUEVO PROCEDIMIENTO';
            _modalCallback = () => nuevo();
        } else if (tipo === 'devolucion') {
            document.getElementById('modalIcon').innerText    = '✅';
            document.getElementById('modalTitulo').innerText  = 'Devolución Completada';
            document.getElementById('modalTitulo').style.color = '#27ae60';
            document.getElementById('modalMensaje').innerText = 'Devolución registrada y PDF generado correctamente.';
            document.getElementById('modalBtn').innerText     = 'NUEVO PROCEDIMIENTO';
            _modalCallback = () => nuevo();
        }

        document.getElementById('modalConfirm').classList.add('show');
    }

    function cerrarModal() {
        document.getElementById('modalConfirm').classList.remove('show');
        if (_modalCallback) _modalCallback();
    }
    // Sin esto, sin internet en terreno = app no carga.
    // Requiere archivo sw.js en la raíz del proyecto.
    // ─────────────────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .catch(err => console.warn('SW no registrado:', err));
        });
    }

</script>
</body>
</html>
