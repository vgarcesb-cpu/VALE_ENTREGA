<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGA PROTOCOLO | S25 Edition</title>
    <style>
        :root { --blue: #2c3e50; --green: #27ae60; --yellow: #f1c40f; --red: #e74c3c; --purple: #8e44ad; --wa: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: #ecf0f1; padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        #printableArea { background: white; width: 100%; max-width: 480px; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--blue); box-sizing: border-box; }
        
        .status { 
            text-align: center; font-weight: bold; padding: 12px; margin-bottom: 15px; border-radius: 6px; 
            font-size: 14px; text-transform: uppercase; border: 2px solid rgba(0,0,0,0.05);
            -webkit-print-color-adjust: exact; print-color-adjust: exact; 
        }
        .status-emision { background-color: var(--yellow) !important; color: #000 !important; }
        .status-registrado { background-color: var(--red) !important; color: #fff !important; }
        .status-devuelto { background-color: var(--green) !important; color: #fff !important; }

        .field { margin-bottom: 10px; }
        label { display: block; font-size: 10px; font-weight: bold; color: var(--blue); margin-bottom: 3px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; box-sizing: border-box; font-size: 14px; color: #000; }
        input[readonly] { background: #f8f9fa; font-weight: bold; color: var(--blue); }

        #sig-wrap { border: 2px dashed var(--blue); background: #fff; border-radius: 8px; height: 160px; position: relative; }
        canvas { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
        
        .no-print { width: 100%; max-width: 480px; margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; color: white; transition: 0.2s; }
        .btn-search { background: var(--blue); }
        .btn-save { background: var(--green); }
        .btn-wa { background: var(--wa); }
        .btn-return { background: var(--purple); display: none; }

        @media print {
            .no-print { display: none !important; }
            body { padding: 0; background: white; }
            #printableArea { box-shadow: none; border: 1px solid #000; max-width: 100%; }
        }
    </style>
</head>
<body>

<div id="printableArea">
    <h2 style="text-align:center; color:var(--blue); margin-top:0;">PROTOCOLO AGA</h2>
    <div id="statusTxt" class="status status-emision">Estado: En Emisión</div>

    <div class="field"><label>ID Transacción</label><input type="text" id="idVale" readonly></div>
    <div class="field"><label>Fecha</label><input type="text" id="fecha" readonly></div>
    <div class="field"><label>Equipo (BMI)</label><input type="text" id="producto" placeholder="Radio, Notebook, etc..."></div>
    <div class="field"><label>Responsable</label><input type="text" id="responsable" placeholder="Nombre completo"></div>
    <div class="field"><label>Observaciones</label><textarea id="obs" rows="2"></textarea></div>
    <div class="field">
        <label>Firma</label>
        <div id="sig-wrap"><canvas id="canvas"></canvas></div>
    </div>
</div>

<div class="no-print">
    <div style="display:flex; gap:0;">
        <input type="text" id="busquedaId" style="flex:1; border-radius: 8px 0 0 8px; border:1px solid #ccc; padding:10px;" placeholder="Buscar ID...">
        <button class="btn btn-search" style="border-radius: 0 8px 8px 0; padding:10px 20px;" onclick="buscarIDB()">BUSCAR</button>
    </div>
    <button id="btnWhatsApp" class="btn btn-wa" onclick="enviarWhatsApp()">Enviar por WhatsApp 📱</button>
    <button id="btnFinalizar" class="btn btn-save" onclick="finalizarProceso()">Finalizar y Registrar</button>
    <button id="btnDevolver" class="btn" style="background:var(--purple); display:none;" onclick="devolverIDB()">Registrar Devolución</button>
    <button class="btn" style="background:#7f8c8d;" onclick="nuevo()">Limpiar / Nuevo</button>
</div>

<script>
    let db;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dibujando = false;

    // 1. MOTOR INDEXED DB - CONEXIÓN ROBUSTA
    const request = indexedDB.open("AGA_DB_FIXED", 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore("vales", { keyPath: "id" });
    };
    request.onsuccess = (e) => { db = e.target.result; nuevo(); };

    function nuevo() {
        document.getElementById('idVale').value = "AGA-" + Math.floor(Date.now() / 1000);
        document.getElementById('fecha').value = new Date().toLocaleString();
        document.getElementById('producto').value = "";
        document.getElementById('responsable').value = "";
        document.getElementById('obs').value = "";
        document.getElementById('busquedaId').value = "";
        
        const st = document.getElementById('statusTxt');
        st.className = "status status-emision";
        st.innerText = "Estado: En Emisión";
        
        document.getElementById('btnFinalizar').style.display = "block";
        document.getElementById('btnDevolver').style.display = "none";
        
        limpiarCanvas();
        ajustarCanvas();
    }

    function ajustarCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
    }

    const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
        return {x, y};
    };
    canvas.addEventListener('mousedown', (e) => { dibujando = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', (e) => { if(!dibujando) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    window.addEventListener('mouseup', () => dibujando = false);
    canvas.addEventListener('touchstart', (e) => { dibujando = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchmove', (e) => { if(!dibujando) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); }, {passive:false});

    function limpiarCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // 2. BUSCADOR REPARADO - Llama registros y activa WhatsApp
    function buscarIDB() {
        const id = document.getElementById('busquedaId').value.trim();
        if(!id) return;
        const tx = db.transaction("vales", "readonly");
        const store = tx.objectStore("vales");
        const req = store.get(id);

        req.onsuccess = () => {
            const r = req.result;
            if(r) {
                document.getElementById('idVale').value = r.id;
                document.getElementById('fecha').value = r.fecha;
                document.getElementById('producto').value = r.producto;
                document.getElementById('responsable').value = r.responsable;
                document.getElementById('obs').value = r.obs;
                const img = new Image();
                img.onload = () => { limpiarCanvas(); ctx.drawImage(img, 0, 0); };
                img.src = r.firma;
                
                const st = document.getElementById('statusTxt');
                if(r.estado === "DEVUELTO") {
                    st.className = "status status-devuelto"; st.innerText = "Estado: Devolución Completada";
                    document.getElementById('btnDevolver').style.display = "none";
                } else {
                    st.className = "status status-registrado"; st.innerText = "Estado: En Custodia (Registrado)";
                    document.getElementById('btnDevolver').style.display = "block";
                }
                document.getElementById('btnFinalizar').style.display = "none";
            } else { alert("ID no encontrado."); }
        };
    }

    // 3. FINALIZAR Y LIMPIAR - Repara el ciclo del PDF
    function finalizarProceso() {
        if(!document.getElementById('producto').value) return alert("Falta Producto");
        
        const st = document.getElementById('statusTxt');
        st.className = "status status-registrado";
        st.innerText = "Estado: En Custodia (Registrado)";

        const vale = {
            id: document.getElementById('idVale').value,
            fecha: document.getElementById('fecha').value,
            producto: document.getElementById('producto').value,
            responsable: document.getElementById('responsable').value,
            obs: document.getElementById('obs').value,
            firma: canvas.toDataURL(),
            estado: "REGISTRADO"
        };

        const tx = db.transaction("vales", "readwrite");
        tx.objectStore("vales").put(vale);

        tx.oncomplete = () => {
            setTimeout(() => { 
                window.print(); // Dispara PDF
                setTimeout(() => { nuevo(); }, 1500); // Limpia tras PDF
            }, 500);
        };
    }

    function devolverIDB() {
        const id = document.getElementById('idVale').value;
        const tx = db.transaction("vales", "readwrite");
        const store = tx.objectStore("vales");
        const req = store.get(id);

        req.onsuccess = () => {
            const data = req.result;
            data.estado = "DEVUELTO";
            data.fecha = "Cerrado: " + new Date().toLocaleString();
            store.put(data);

            const st = document.getElementById('statusTxt');
            st.className = "status status-devuelto";
            st.innerText = "Estado: Devolución Completada";
            document.getElementById('fecha').value = data.fecha;

            setTimeout(() => { 
                window.print(); 
                setTimeout(() => { nuevo(); }, 1500);
            }, 500);
        };
    }

    function enviarWhatsApp() {
        const id = document.getElementById('idVale').value;
        const prod = document.getElementById('producto').value;
        const resp = document.getElementById('responsable').value;
        const est = document.getElementById('statusTxt').innerText;
        const msg = `*AGA PROTOCOLO*%0A*ID:* ${id}%0A*Equipo:* ${prod}%0A*Responsable:* ${resp}%0A*${est}*`;
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
